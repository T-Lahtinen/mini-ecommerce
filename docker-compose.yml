services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "8000:8080"
        environment:
            PHP_OPCACHE_ENABLE: 0
        depends_on:
            - mysql

    mysql:
        image: mysql:8.4
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: laravel
            MYSQL_USER: laravel
            MYSQL_PASSWORD: password
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3307:3306"
        volumes:
            - mysql-data:/var/lib/mysql

volumes:
    mysql-data:
